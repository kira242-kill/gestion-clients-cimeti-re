<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Réservation Tombe | G_C</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="mb-4 text-center">Espace de Réservation</h2>
        <p class="text-center text-muted">Sélectionnez une tombe disponible pour initier votre demande.</p>
        
        <div id="tombes-disponibles" class="row mt-4">
            <div class="text-center">Chargement des tombes...</div>
        </div>
    </div>

    <div class="modal fade" id="modalReservation" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="formReservation">
                    {% csrf_token %}
                    <div class="modal-header">
                        <h5 class="modal-title">Finaliser votre réservation</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="tombe_id">
                        <input type="email" id="email" class="form-control mb-3" placeholder="Votre email" required>
                        <input type="text" id="nom" class="form-control mb-3" placeholder="Nom du défunt" required>
                        <input type="text" id="prenom" class="form-control mb-3" placeholder="Prénom du défunt" required>
                        
                        <div class="alert alert-info small">
                            <strong>Frais de dossier : 50.000 FCFA</strong>
                            <div class="form-check mt-2">
                                <input class="form-check-input" type="checkbox" id="paiementValide" required>
                                <label class="form-check-label" for="paiementValide">
                                    J'ai effectué le paiement des frais de dossier.
                                </label>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                        <button type="submit" class="btn btn-primary">Confirmer la demande</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>

        const csrftoken = document.querySelector('[name=csrfmiddlewaretoken]').value;
        const btn = e.target.querySelector('button[type="submit"]');
        btn.disabled = true;
        btn.innerText = "Envoi en cours...";

        // Après le fetch :
        btn.disabled = false;
        btn.innerText = "Confirmer la demande";

        async function chargerTombesClient() {
            try {
                const response = await fetch('/gestion/api/tombes?statut=Disponible');
                const tombes = await response.json();
                const container = document.getElementById('tombes-disponibles');
                container.innerHTML = "";
                
                if (tombes.length === 0) {
                    container.innerHTML = "<p class='text-center'>Aucune tombe disponible pour le moment.</p>";
                    return;
                }

                tombes.forEach(t => {
                    container.innerHTML += `
                        <div class="col-md-3 mb-3">
                            <div class="card p-3 shadow-sm border-0">
                                <h5 class="card-title">Tombe N° ${t.numero_tombe}</h5>
                                <button class="btn btn-success w-100" onclick="ouvrirModal(${t.id})">Réserver</button>
                            </div>
                        </div>`;
                });
            } catch (error) {
                console.error("Erreur:", error);
            }
        }

        function ouvrirModal(id) {
            document.getElementById('tombe_id').value = id;
            new bootstrap.Modal(document.getElementById('modalReservation')).show();
        }

        // Gestion de la soumission du formulaire avec validation
        document.getElementById('formReservation').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                email_client: document.getElementById('email').value,
                nom_defunt_prevu: document.getElementById('nom').value,
                prenom_defunt_prevu: document.getElementById('prenom').value,
                tombe_id: document.getElementById('tombe_id').value
            };
            
            try {
                const response = await fetch('/gestion/api/creer-demande', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    alert("Demande envoyée avec succès !");
                    location.reload();
                } else {
                    alert("Erreur lors de la réservation.");
                }
            } catch (err) {
                alert("Erreur de connexion au serveur.");
            }
        });

        // Dans ton fetch :
        const response = await fetch('/gestion/api/creer-demande', {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'X-CSRFToken': csrftoken 
            },
            body: JSON.stringify(data)
        });

        chargerTombesClient();
    </script>
</body>
</html>
