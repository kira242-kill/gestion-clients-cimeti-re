<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | G_C Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --bg-dark: #1a2a34; --text-main: #ffffff; }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 10px; }
        .login-card { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); width: 100%; max-width: 400px; }
        .btn-back { color: #bdc3c7; text-decoration: none; font-size: 0.9rem; margin-bottom: 1rem; display: block; }
    </style>
</head>
<body>
    <div class="login-card">
        <a href="{% url 'index' %}" class="btn-back">← Retour à l'accueil</a>
        <h3 class="text-center mb-4">Espace Agent</h3>
        <form id="loginForm">
            {% csrf_token %}
            <div class="mb-3">
                <input type="text" id="username" class="form-control" placeholder="Nom d'utilisateur" required>
            </div>
            <div class="mb-4">
                <input type="password" id="password" class="form-control" placeholder="Mot de passe" required>
            </div>
            <button type="submit" id="submitBtn" class="btn btn-primary w-100">SE CONNECTER</button>
            <div id="message" class="mt-3 text-center text-danger small"></div>
        </form>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "CONNEXION...";
            const response = await fetch('/api/login', { 
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
                },
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                })
            });
            if (response.ok) {
                window.location.href = '/gestion/dashboard';
            } else {
                btn.disabled = false;
                btn.innerText = "SE CONNECTER";
                document.getElementById('message').innerText = "Identifiants incorrects.";
            }
        });
    </script>
</body>
</html>
