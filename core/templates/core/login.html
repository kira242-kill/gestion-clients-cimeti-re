<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion | G_C Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 2.5rem; border-radius: 1rem; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .btn-primary { background: #212529; border: none; padding: 12px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 class="text-center mb-4 fw-bold">Espace Agent</h2>
        <form id="loginForm">
            {% csrf_token %}
            <div class="mb-3">
                <input type="text" id="username" class="form-control form-control-lg" placeholder="Nom d'utilisateur" required>
            </div>
            <div class="mb-4">
                <input type="password" id="password" class="form-control form-control-lg" placeholder="Mot de passe" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold">SE CONNECTER</button>
            <div id="message" class="mt-3 text-center text-danger small"></div>
        </form>
    </div>

    <script>
        const csrftoken = document.querySelector('[name=csrfmiddlewaretoken]').value;

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.innerText = "CONNEXION...";

            // Vérifie que cette URL correspond à celle définie dans tes URLs (ex: /api/login)
            const response = await fetch('/api/login', { 
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrftoken 
                },
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                })
            });

            if (response.ok) {
                window.location.href = '/gestion/dashboard';
            } else {
                btn.disabled = false;
                btn.innerText = "SE CONNECTER";
                document.getElementById('message').innerText = "Identifiants incorrects.";
            }
        });
    </script>
</body>
</html>
