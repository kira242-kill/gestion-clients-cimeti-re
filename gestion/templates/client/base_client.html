<!DOCTYPE html>
{% load static %}
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portail Client | G_C</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="shortcut icon" href="{% static 'images/favicon.ico' %}" type="image/x-icon">
    <style>
        body { background: linear-gradient(135deg, #1a2a34 0%, #2c3e50 100%) !important; min-height: 100vh; color: #d1d8e0 !important; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .main-wrapper { background: rgba(255, 255, 255, 0.08) !important; backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 40px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); }
        h1, h2, h3, h4, h5 { color: #ffffff !important; }
        .nav-tabs .nav-link { color: #a4b0be !important; border: none !important; }
        .nav-tabs .nav-link.active { color: #3498db !important; border-bottom: 3px solid #3498db !important; background: transparent !important; }
        .hero-section, .service-card { background: rgba(0, 0, 0, 0.2) !important; border: 1px solid rgba(255, 255, 255, 0.05) !important; color: #d1d8e0 !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-wrapper">
        <div class="d-flex justify-content-end">
            <a href="{% url 'gestion:client_logout' %}" class="btn btn-outline-danger btn-sm mb-3">Déconnexion</a>
        </div>

        <nav class="nav nav-tabs justify-content-center mb-4">
            <a class="nav-link {% if section == 'accueil' %}active{% endif %}" href="?section=accueil">Accueil</a>
            <a class="nav-link {% if section == 'demande' %}active{% endif %}" href="?section=demande">Faire une demande</a>
            <a class="nav-link {% if section == 'suivi' %}active{% endif %}" href="?section=suivi">Suivi et Reçus</a>
        </nav>

        <div class="content-area">
            {% include section_template %}
        </div>
    </div>
</div>

</body>
</html>
