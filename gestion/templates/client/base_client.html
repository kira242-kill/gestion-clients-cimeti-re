{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portail Client | G_C</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1a2a34 0%, #2c3e50 100%) !important; min-height: 100vh; color: #d1d8e0 !important; padding: 15px; }
        .main-wrapper { background: rgba(255, 255, 255, 0.08) !important; backdrop-filter: blur(10px); border-radius: 15px; padding: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        h1, h2, h3 { color: #ffffff !important; }
        /* Responsive Tabs */
        .nav-tabs { flex-wrap: wrap; }
        .nav-link { color: #a4b0be !important; border: none !important; }
        .nav-link.active { color: #3498db !important; border-bottom: 2px solid #3498db !important; }
        @media (max-width: 576px) { .main-wrapper { padding: 15px; } }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="main-wrapper">
        <div class="text-end mb-3">
            <a href="{% url 'gestion:client_logout' %}" class="btn btn-outline-danger btn-sm">Déconnexion</a>
        </div>

        <nav class="nav nav-tabs justify-content-center mb-4">
            <a class="nav-link {% if section == 'accueil' %}active{% endif %}" href="?section=accueil">Accueil</a>
            <a class="nav-link {% if section == 'demande' %}active{% endif %}" href="?section=demande">Demande</a>
            <a class="nav-link {% if section == 'suivi' %}active{% endif %}" href="?section=suivi">Suivi</a>
        </nav>

        <div class="content-area">
            {% include section_template %}
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
