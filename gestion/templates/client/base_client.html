{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portail Client | G_C</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<div class="container-fluid">
    <div class="main-wrapper">
        <div class="text-end mb-3">
            <a href="{% url 'gestion:client_logout' %}" class="btn btn-outline-danger btn-sm">Déconnexion</a>
        </div>

        <nav class="nav nav-tabs justify-content-center mb-4">
            <a class="nav-link {% if section == 'accueil' %}active{% endif %}" href="?section=accueil">Accueil</a>
            <a class="nav-link {% if section == 'demande' %}active{% endif %}" href="?section=demande">Demande</a>
            <a class="nav-link {% if section == 'suivi' %}active{% endif %}" href="?section=suivi">Suivi</a>
        </nav>

        <div class="content-area">
            {% include section_template %}
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
