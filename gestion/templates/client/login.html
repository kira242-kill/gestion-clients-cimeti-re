<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accès Client | G_C</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --bg-dark: #1a2a34; --text-main: #ffffff; }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 10px; }
        .login-card { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); width: 100%; max-width: 400px; }
        .btn-back { color: #bdc3c7; text-decoration: none; font-size: 0.9rem; margin-bottom: 1rem; display: block; }
    </style>
</head>
<body>
    <div class="login-card">
        <a href="{% url 'index' %}" class="btn-back">← Retour à l'accueil</a>
        <h3 class="text-center mb-4">Connexion Client</h3>
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-info text-center">{{ message }}</div>
            {% endfor %}
        {% endif %}
        <form id="loginForm" method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Email de suivi</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <button type="submit" id="submitBtn" class="btn btn-success w-100">Envoyer le code OTP</button>
        </form>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function() {
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = 'Envoi en cours...';
        });
    </script>
</body>
</html>
