<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Accès Client | G_C</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1a2a34; color: white; display: flex; align-items: center; min-height: 100vh; }
        .login-card { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4 login-card">
                <h3 class="text-center mb-4">Connexion Client</h3>
                <form id="loginForm" method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label>Email de suivi</label>
                        <input type="email" name="email" id="emailInput" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100" id="submitBtn">Se connecter</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Exemple de JS pour améliorer l'expérience
        document.getElementById('loginForm').addEventListener('submit', function() {
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = 'Vérification...';
        });
    </script>
</body>
</html>
