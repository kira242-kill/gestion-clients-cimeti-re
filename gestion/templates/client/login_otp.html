<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vérification OTP - Portail Client</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(135deg, #1a2a34 0%, #2c3e50 100%); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            padding: 15px; /* Ajout d'un padding pour mobile */
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 20px; 
            padding: 40px; 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 400px;
        }
        .form-control { 
            background: rgba(255, 255, 255, 0.05) !important; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            color: white !important; 
            text-align: center;
            font-size: 1.5rem;
            letter-spacing: 8px;
        }
    </style>
</head>
<body>

<div class="glass-card text-white text-center">
    <h3>Vérification OTP</h3>
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-danger p-2 small">{{ message }}</div>
        {% endfor %}
    {% endif %}
    <p class="small opacity-75">Entrez le code envoyé à votre adresse email.</p>
    
    <form method="POST">
        {% csrf_token %}
        <div class="mb-4">
            <input type="text" name="code" class="form-control" placeholder="000000" required maxlength="6" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, '');">
        </div>
        <button type="submit" class="btn btn-primary w-100">Vérifier et Accéder</button>
    </form>
    
    <div class="mt-3">
        <a href="{% url 'gestion:client_login' %}" class="text-white opacity-50 text-decoration-none small">Retour à la connexion</a>
    </div>
</div>

</body>
</html>
