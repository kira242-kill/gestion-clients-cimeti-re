<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inscription Client | G_C</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1a2a34 0%, #2c3e50 100%); min-height: 100vh; display: flex; align-items: center; color: white; }
        .register-card { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(15px); padding: 40px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 register-card">
                <h3 class="text-center mb-4">Créer un compte Client</h3>
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }} <button type="submit" class="btn btn-primary w-100 mt-3">S'inscrire</button>
                    <p class="text-center mt-3">Déjà inscrit ? <a href="{% url 'gestion:client_login' %}">Connectez-vous</a></p>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
