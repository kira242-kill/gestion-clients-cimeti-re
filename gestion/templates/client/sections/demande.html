<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Réservation de Concession | Gestion Cimetière</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
    /* Fond global sombre */
    body { background: linear-gradient(135deg, #1a2a34 0%, #2c3e50 100%); min-height: 100vh; padding-top: 50px; }

    .card {
        background: rgba(7, 8, 51, 0.05);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        color: white;
        transition: transform 0.3s ease;
    }

    .form-control, .form-select {
        background: rgba(255, 255, 255, 0.1) !important;
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: white !important;
        border-radius: 10px;
    }

    .form-select {color: #000 !important;}

    .form-control:focus {
        background: rgba(255, 255, 255, 0.2) !important;
        border-color: #3498db;
        box-shadow: 0 0 0 0.25rem rgba(52, 152, 219, 0.25);
    }

    .btn-primary {
        background: linear-gradient(to right, #3498db, #2980b9);
        border: none;
        border-radius: 10px;
        transition: all 0.4s ease;
    }

    .btn-primary:hover { transform: scale(1.02); filter: brightness(1.2); }

    /* Animation d'apparition */
    .card { animation: fadeInUp 0.6s ease-out; }
    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h2 class="text-center mb-4">Nouvelle Réservation</h2>
                <p class="text-muted text-center" style="color: #ffffff !important;">
                    Veuillez remplir les informations pour réserver une concession.
                </p>

                <form id="formDemande">
                    <div class="mb-3">
                        <label class="form-label">Email de contact</label>
                        <input type="email" id="email" class="form-control" placeholder="nom@exemple.com" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nom du défunt</label>
                            <input type="text" id="nom" class="form-control" placeholder="Nom" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Prénom du défunt</label>
                            <input type="text" id="prenom" class="form-control" placeholder="Prénom" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Date souhaitée pour l'enterrement</label>
                        <input type="date" id="date_enterrement" class="form-control" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Emplacement souhaité (Tombe)</label>
                        <select id="tombe_id" class="form-select" >
                            {% for t in tombes %}
                                <option value="{{ t.id }}">Tombe {{ t.numero_tombe }} - Zone {{ t.zone.nom_zone }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100">Soumettre ma demande</button>
                    <div id="feedback" class="mt-3 text-center"></div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('formDemande').onsubmit = async (e) => {
    e.preventDefault(); // Empêche le rechargement brutal de la page
    
    const form = e.target;
    const btn = form.querySelector('button');
    const feedback = document.getElementById('feedback');
    
    // État "chargement" : on désactive le bouton pour éviter les doubles clics
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Envoi en cours...';
    feedback.innerHTML = ''; // Vide les anciens messages
    
    // Récupération des données du formulaire
    const data = {
        email_client: document.getElementById('email').value,
        nom_defunt_prevu: document.getElementById('nom').value,
        prenom_defunt_prevu: document.getElementById('prenom').value,
        date_enterrement: document.getElementById('date_enterrement').value,
        tombe_id: document.getElementById('tombe_id').value
    };
    
    try {
        const res = await fetch('/gestion/api/creer-demande', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                // N'oublie pas d'ajouter ton header CSRF ici si tu utilises Django sans désactiver CSRF
            },
            body: JSON.stringify(data)
        });
        
        if (res.ok) {
            // Succès : Message visuel
            feedback.innerHTML = '<div class="alert alert-success mt-3 animate__animated animate__fadeIn">Votre demande a été enregistrée avec succès !</div>';
            form.reset(); // Réinitialise les champs
        } else {
            // Erreur serveur
            feedback.innerHTML = '<div class="alert alert-danger mt-3 animate__animated animate__shakeX">Une erreur est survenue, veuillez réessayer plus tard.</div>';
        }
    } catch (err) {
        // Erreur réseau
        feedback.innerHTML = '<div class="alert alert-warning mt-3">Erreur réseau : vérifiez votre connexion.</div>';
    } finally {
        // Réactivation du bouton
        btn.disabled = false;
        btn.innerHTML = "Soumettre ma demande";
    }
};
</script>
</body>
</html>
