{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Agent - G_C</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Structure de base */
        body { display: flex; min-height: 100vh; overflow-x: hidden; transition: background-color 0.3s, color 0.3s; }
        #sidebar { min-width: 250px; max-width: 250px; background: #212529 !important; color: white !important; min-height: 100vh; }
        #content { flex-grow: 1; padding: 20px; display: flex; flex-direction: column; }
        #content-area { flex-grow: 1; width: 100%; }
        
        .nav-link { color: #adb5bd; cursor: pointer; }
        .nav-link:hover { color: white; background: #343a40; }

        /* Définition des variables de thèmes */
        :root {
            --bg-main: #f8f9fa;
            --text-main: #212529;
            --card-bg: #ffffff;
            --input-bg: #ffffff;
            --input-text: #000000;
        }

        body.theme-light { --bg-main: #f8f9fa; --text-main: #212529; --card-bg: #ffffff; --input-bg: #ffffff; --input-text: #000000; }
        body.theme-dark-1 { --bg-main: #2c3e50; --text-main: #ffffff; --card-bg: #34495e; --input-bg: #2c3e50; --input-text: #ffffff; }
        body.theme-dark-2 { --bg-main: #1a1a2e; --text-main: #ffffff; --card-bg: #16213e; --input-bg: #1a1a2e; --input-text: #ffffff; }
        body.theme-dark-3 { --bg-main: #0f3460; --text-main: #ffffff; --card-bg: #1a1a2e; --input-bg: #0f3460; --input-text: #ffffff; }

        /* Application des variables */
        body { background-color: var(--bg-main) !important; color: var(--text-main) !important; }
        .card, .table { background-color: var(--card-bg) !important; color: var(--text-main) !important; }
        input, select, textarea { background-color: var(--input-bg) !important; color: var(--input-text) !important; border: 1px solid #666; }
        
        /* Utilitaires */
        .border-left-success { border-left: .25rem solid #1cc88a !important; }
        .border-left-danger { border-left: .25rem solid #e74a3b !important; }
        .border-left-warning { border-left: .25rem solid #f6c23e !important; }

        /* Définition des variables de thème */
        :root {
            --bg-main: #f8f9fa;
            --text-main: #212529;
            --card-bg: #ffffff;
        }

        /* Thèmes sombres */
        body.theme-dark-1 { --bg-main: #2c3e50; --text-main: #ffffff; --card-bg: #34495e; }
        body.theme-dark-2 { --bg-main: #1a1a2e; --text-main: #ffffff; --card-bg: #16213e; }
        body.theme-dark-3 { --bg-main: #0f3460; --text-main: #ffffff; --card-bg: #1a1a2e; }

        /* Application automatique */
        body { background-color: var(--bg-main) !important; color: var(--text-main) !important; transition: 0.3s; }

        /* Force les éléments (cartes, tableaux, formulaires) à suivre le thème */
        .card, .table, .form-control { 
            background-color: var(--card-bg) !important; 
            color: var(--text-main) !important; 
            border-color: #4b6584 !important; 
        }

        /* Force les textes grisés à devenir lisibles */
        .text-muted, .text-gray-800 { color: var(--text-main) !important; opacity: 0.8; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <div id="sidebar" class="p-3">
        <h3>G_C Admin</h3>
        <hr>
        <ul class="nav flex-column">
            <li class="nav-item"><a class="nav-link" onclick="loadSection('dashboard_home')">Tableau de bord</a></li>
            <li class="nav-item"><a class="nav-link" onclick="loadSection('tombes')">Gestion Tombes</a></li>
            <li class="nav-item"><a class="nav-link" onclick="loadSection('demandes')">Demandes</a></li>
            <li class="nav-item"><a class="nav-link" onclick="loadSection('cartographie')">Cartographie</a></li>
            <li class="nav-item"><a class="nav-link" onclick="loadSection('utilisateurs')">Utilisateurs</a></li>
            {% if user.is_staff %}
            <li class="nav-item"><a class="nav-link" onclick="loadSection('gestion_clients')">Gestion des Clients</a></li>
            {% endif %}
            <li class="nav-item"><a class="nav-link" onclick="loadSection('amenagement')">Aménagement</a></li>
            <li class="nav-item"><a class="nav-link" onclick="loadSection('parametres')">Paramètres</a></li>
            <li class="nav-item"><a class="nav-link" onclick="loadSection('historique')">Historique</a></li>
            <li class="nav-item mt-5"><a href="/gestion/logout/" class="nav-link text-danger">Déconnexion</a></li>
        </ul>
    </div>

    <div id="content">
        {% csrf_token %}
        <div id="loading-spinner" class="d-none text-center my-5">
            <div class="spinner-border text-primary" role="status"></div>
        </div>
        <div id="content-area"></div>
    </div>

    <script>
        window.onload = function() { loadSection('dashboard_home'); };

        function loadSection(section) {
            const spinner = document.getElementById('loading-spinner');
            const area = document.getElementById('content-area');
            spinner.classList.remove('d-none');
            
            fetch('/gestion/render-section/' + section + '/')
                .then(response => response.text())
                .then(html => {
                    area.innerHTML = html;
                    spinner.classList.add('d-none');
                    
                    const scripts = area.querySelectorAll('script');
                    scripts.forEach(oldScript => {
                        const existing = document.querySelector(`script[data-section="${section}"]`);
                        if (existing) existing.remove();
                        const newScript = document.createElement('script');
                        newScript.setAttribute('data-section', section);
                        newScript.innerHTML = oldScript.innerHTML;
                        document.body.appendChild(newScript);
                    });
                    
                    setTimeout(() => {
                        if (typeof window[`init_${section}`] === 'function') window[`init_${section}`]();
                    }, 200);
                });
        }

        document.addEventListener('click', function(e) {
            if (e.target.matches('[data-theme]')) applyTheme(e.target.getAttribute('data-theme'));
        });

        function applyTheme(theme) {
            const themes = ['theme-light', 'theme-dark-1', 'theme-dark-2', 'theme-dark-3'];
            themes.forEach(t => document.body.classList.remove(t));
            document.body.classList.add(theme);
            localStorage.setItem('theme', theme);
        }

        window.addEventListener('load', () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) document.body.classList.add(savedTheme);
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
