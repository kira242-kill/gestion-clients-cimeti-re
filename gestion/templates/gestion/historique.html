<div class="container-fluid">
<table class="table" style="color: var(--text-main) !important;">
    <thead>
        <tr>
            <th>Date</th>
            <th>Agent</th>
            <th>Action</th>
            <th>Détails</th>
        </tr>
    </thead>
    <tbody id="historique-list"></tbody>
</table>
</div>

<script>
    window.init_historique = function() {
        fetch('/gestion/api/historique') // Vérifie que cette URL existe dans tes urls.py
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('historique-list');
                tbody.innerHTML = data.map(act => `
                    <tr>
                        <td>${act.date_action}</td>
                        <td>${act.agent}</td>
                        <td>${act.action}</td>
                        <td>${act.details}</td>
                    </tr>
                `).join('');
            });
    };
</script>
